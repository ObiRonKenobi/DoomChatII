<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoomChat II</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>DoomChat II</h1>
    <span id="status" class="status">connecting...</span>
  </header>
  <main class="terminal-grid">
    <div id="chat-pane" class="pane chat-pane">
      <div class="pane-label">CHAT</div>
      <pre id="chat-banner" class="chat-banner"></pre>
      <div id="chat-terminal" class="terminal-host"></div>
    </div>
    <div id="system-pane" class="pane system-pane">
      <div class="pane-label">SYSTEM</div>
      <div id="system-terminal" class="terminal-host"></div>
    </div>
  </main>
  <footer class="input-bar">
    <span class="prompt">&gt;</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a message or /help">
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
