services:
  doomchat:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - doomchat_data:/data
    environment:
      PORT: "8080"
      DATA_DIR: /data
      BASE_URL: ${BASE_URL:-http://127.0.0.1:8080}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  doomchat_data:
